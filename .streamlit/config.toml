[theme]
# The main accent color (Used for buttons, loading spinners, and highlights)
# I'm going with cyberpunk Neon Purple. (You can change this hex code to anything!)
primaryColor = "#B800FF"

# The main app background color
backgroundColor = "#0A0A0A"

# The sidebar and chat bubble background color
secondaryBackgroundColor = "#1A1A1A"

# The text color 
textColor = "#E0E0E0"

# The font style (Options: "sans serif", "serif", or "monospace")
font = "sans serif"
